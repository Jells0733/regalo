<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 🤍</title>

<style>
body {
  margin: 0;
  padding: 0;
  height: 100vh;
  background: linear-gradient(135deg, #000000,#63b4ff, #5cf8bc, #000000);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: "Gotham", sans-serif;
  overflow: hidden;
}

.fondoFinal {
  background: url("imagenes/fondo.jpeg") center/cover no-repeat !important;
}

/* 🔐 PANTALLA PASSWORD */
#loginScreen {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("imagenes/sospechoso.jpeg") center/cover repeat;
  background-size: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
  z-index: 9999;
}

#loginBox {
  background: rgba(0, 0, 0, 0.55);
  padding: 40px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  box-shadow: 0 15px 40px rgba(0,0,0,0.4);
  text-align: center;
}

#loginScreen input {
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  text-align: center;
}

#loginScreen button {
  margin-top: 10px;
  padding: 8px 15px;
  border-radius: 15px;
  border: none;
  cursor: pointer;
}

/* CONTENIDO PRINCIPAL */
.container {
  text-align: center;
  z-index: 2;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 25px;
  width: 340px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}


img {
  width: 250px;
  display: block;
  margin: 0 auto 15px auto;
  border-radius: 15px;
  transition: 0.5s;
}

#video {
  width: 300px;
  display: none;
  margin: 0 auto 15px auto;
  border-radius: 15px;
}

h1 {
  font-size: 18px;
  color: #333;
  margin: 20px 0;
  min-height: 90px;
}

button {
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background: #000000;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #63b4ff;
}

.fade {
  opacity: 0;
  transform: scale(0.9);
}

/* ✨ BRILLO FINAL */
.glow {
  font-size: 20px;
  color: #000000;
  animation: glowEffect 1.5s infinite alternate;
}

@keyframes glowEffect {
  from {
    text-shadow: 0 0 5px #00e1ff,
                 0 0 10px #00ffea,
                 0 0 20px #16aa42;
  }
  to {
    text-shadow: 0 0 20px #00e1ff,
                 0 0 30px #00ffea,
                 0 0 40px #16aa42;
  }
}

/* 💖 CORAZONES */
.heart {
  position: fixed;
  bottom: -10px;
  font-size: 20px;
  animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
  from { transform: translateY(0); opacity: 1; }
  to { transform: translateY(-110vh); opacity: 0; }
}

/* ☁️ MENSAJE FINAL SECRETO */
#finalMessage {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 32px;
  color: white;
  text-align: center;
  opacity: 0;
  transition: opacity 2s ease;
  z-index: 5;
  pointer-events: none;
}

.showFinal {
  opacity: 70;
}

</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginScreen">
  <div id="loginBox">
    <h2>🔐 Mensaje secreto</h2>
    <p>Ingresa la contraseña</p>
    <input type="password" id="passwordInput">
    <button onclick="checkPassword()"> Bien pueda :3</button>
    <p id="error"></p>
  </div>
</div>

<div class="container">
  <div class="card">
    <div id="mediaContainer">
  <img id="imagenes" src="imagenes/imagen1.jpeg">
  <video id="video" width="200" style="display:none;" muted loop playsinline>
    <source src="video/gato.mp4" type="video/mp4">
  </video>
</div>
    <h1 id="text"></h1>
    <button id="btn" onclick="nextMessage()">Vamo a darle 🤍</button>
  </div>

</div>

<div id="finalMessage">Siempre te amaré.☁️✨</div>

<audio id="audio" src="audio/cancion.mp3" loop></audio>

<script>

function checkPassword(){
  const input = document.getElementById("passwordInput").value;
  if(input === "0212"){
    document.getElementById("loginScreen").style.display="none";
  } else {
    document.getElementById("error").innerText="Nompuede ser, esa nues :c";
  }
}

const messages = [
"Soi io de nuevo :v",
"Quizás te preguntarás, rayossss ¿qué es esta mondá?",
"Y, es una muy buena pregunta…",
"Possss cheka esto :v",
"jijijijii bromitaaaaa",
"NoOoOo un calvazoooo noOooOo",
"Oie, no te enojes porfisss",
"Weno, lo que quería decirte es que…",
"Eres tan inteligente, y disfruto tanto escucharte hablar de todo lo que te gusta, de lo que haces y creas, es muy impresionante y placentero.",
"Eres tan divertido, me encanta tu sentido del humor, la forma en la que haces sonreír a los demás es tan única.",
"Y la forma en la que haces popito también lo es v:",
"Eres tan responsable, trabajadororologo, estudioso, crack en los videojuegos y haciendo pikessss :3",
"Y ni hablar de esas pompis UwU jashjas no, de verdad tienes una carita y un cuerpo tan preciosos.😊",
"Pidon por eso primero, me emocioné jajaj :c",
"Eres amable, respetuoso, tan detallista, tan dulce y tierno, nunca te rindes, eres tan fuerte y valiente, tan TÚ.🖤",
"Simplemente eres magia, eres paz, eres luz.✨",
"Eres un hombre tan maravilloso y valioso, de verdad te admiro sinceramente y estoy muyyyyy orgullosa de ti.",
"¡FELIZ DÍA DEL HOMBRE! Gracias por existir.🥺"
];

const images = [
"imagenes/imagen1.jpeg",
"imagenes/imagen2.jpeg",
"imagenes/imagen3.jpeg",
"imagenes/imagen4.jpeg",
"imagenes/imagen5.jpeg",
"imagenes/imagen6.jpeg",
"imagenes/imagen7.jpeg",
"imagenes/imagen8.jpeg",
"imagenes/imagen9.jpeg",
"imagenes/imagen10.jpeg",
"imagenes/imagen11.jpeg",
"imagenes/imagen12.jpeg",
"imagenes/imagen13.jpeg",
"imagenes/imagen14.jpeg",
"imagenes/imagen15.jpeg",
"imagenes/imagen16.jpeg",
"imagenes/imagen17.jpeg",
"imagenes/imagen18.jpeg"
];

let index = 0;
let typing = false;

const textElement = document.getElementById("text");
const imageElement = document.getElementById("imagenes");
const videoElement = document.getElementById("video");
const button = document.getElementById("btn");
const music = document.getElementById("audio");

const buttonTexts = ["Siguiente","Weno","Síguele","Next, porque estudiamos inglish","Ya sé, mucho texto","Mera intensa o k?", 
"Pos paila :v", "A ti te gusta dar click", "Tons no te quejes jiji", "Sin mente...", "Como el demente xD",  "Falta pocooo",  "Ya casiiii", 
"No te creas :v", "Ahora sí", "Creéme :3", "Tuve fé 🙏", "Lo logramos ❤️‍🩹",
 ];

function typeWriter(text){
  typing = true;
  button.disabled = true;
  textElement.innerHTML = "";

  let i = 0;

  function typingEffect(){
    if(i < text.length){
      textElement.innerHTML += text.charAt(i);
      i++;
      setTimeout(typingEffect, 30);
    } else {

      typing = false;
      button.disabled = false;

      // 🔥 DETECTAR ÚLTIMO MENSAJE CORRECTAMENTE
     if(index === messages.length - 1){

  textElement.classList.add("glow");

  document.body.classList.add("fondoFinal");
  
  startHearts();

  setTimeout(()=>{
    document.getElementById("finalMessage").classList.add("showFinal");
  }, 4000);

  button.innerText = "Chau 🤍";

  setTimeout(()=>{
    button.style.display = "none";
  }, 5000);
}
    }
  }

  typingEffect();
}

function nextMessage(){

  if(index===0){
    music.play();
  }

  if(typing) return;

  index++;

  if(index<messages.length){

    textElement.classList.remove("glow");
    imageElement.classList.add("fade");

    setTimeout(()=>{
      if(index === messages.length - 1){
    imageElement.style.display = "none";
    videoElement.style.display = "block";
    videoElement.play();
} else {
    videoElement.pause();
    videoElement.style.display = "none";
    imageElement.style.display = "block";
    imageElement.src = images[index];
}
      imageElement.classList.remove("fade");
      typeWriter(messages[index]);
      button.innerText=buttonTexts[index%buttonTexts.length];
    },300);
  }
}

typeWriter(messages[0]);

function startHearts(){
  setInterval(()=>{
    const heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="🤍";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(Math.random()*20+15)+"px";
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),5000);
  },300);
}

</script>

</body>
</html>
